<h2>Login - Tienda de Comics</h2>

<form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>
  <div>
    <label for="username">Usuario</label>
    <input type="text" id="username" name="username" ngModel required #username="ngModel"/>
    <div *ngIf="username.invalid && username.touched">
      <div *ngIf="username.errors?.['required']">Usuario es obligatorio</div>
    </div>
  </div>
  <div>
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" ngModel required #password="ngModel"/>
    <div *ngIf="password.invalid && password.touched">
      <div *ngIf="password.errors?.['required']">Contraseña es obligatoria</div>
    </div>
  </div>
  <button type="submit" [disabled]="miForm.invalid">Ingresar</button>
</form>

<p *ngIf="mensaje">{{ mensaje }}</p>
