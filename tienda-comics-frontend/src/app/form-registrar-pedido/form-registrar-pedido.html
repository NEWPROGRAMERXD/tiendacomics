<h2>Registrar Nuevo Pedido</h2>

<form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>

  <div>
    <label>Selecciona un Comic</label>
    <select name="comicId" ngModel required (change)="onComicChange($any($event.target).value)">
      <option value="">-- Selecciona un comic --</option>
      <option *ngFor="let comic of comics" [value]="comic.id">
        {{ comic.titulo }} - {{ comic.autor }} (S/. {{ comic.precio }})
      </option>
    </select>
  </div>

  <div *ngIf="comicSeleccionado">
    <label>Cantidad</label>
    <input type="number" name="cantidad" [(ngModel)]="cantidad" min="1" [max]="comicSeleccionado.stock"/>
    <small>Stock disponible: {{ comicSeleccionado.stock }}</small>
  </div>

  <div *ngIf="comicSeleccionado">
    <label>Total a Pagar</label>
    <input type="text" [value]="'S/. ' + calcularTotal().toFixed(2)" readonly/>
  </div>

  <div>
    <label>Fecha</label>
    <input type="date" name="fecha" ngModel required #fecha="ngModel"/>
    <div *ngIf="fecha.invalid && fecha.touched">Fecha es obligatoria</div>
  </div>

  <div>
    <label>Nombre del Cliente</label>
    <input type="text" name="clienteNombre" ngModel required #clienteNombre="ngModel"/>
    <div *ngIf="clienteNombre.invalid && clienteNombre.touched">Nombre es obligatorio</div>
  </div>

  <div>
    <label>Email del Cliente</label>
    <input type="email" name="clienteEmail" ngModel required #clienteEmail="ngModel"/>
    <div *ngIf="clienteEmail.invalid && clienteEmail.touched">Email es obligatorio</div>
  </div>

  <button type="submit" [disabled]="miForm.invalid || !comicSeleccionado">Registrar Pedido</button>
  <a routerLink="/comics"><button type="button">Cancelar</button></a>

</form>

<p *ngIf="mensaje">{{ mensaje }}</p>
